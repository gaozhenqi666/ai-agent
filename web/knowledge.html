<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库 · Harness</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Override layout for full-bleed knowledge page */
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }

    .topbar-nav { display: flex; align-items: center; gap: 8px; }
    .topbar-nav .nav-item { padding: 5px 10px; font-size: 12.5px; }

    .sort-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .sort-row .right { margin-left: auto; display: flex; gap: 6px; }
    .sort-btn {
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .sort-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
    .sort-btn:hover:not(.active) { border-color: var(--ink); color: var(--ink); }
  </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <!-- Top bar (no sidebar in this layout) -->
      <header class="topbar">
        <a href="index.html" style="display:flex; align-items:center;">
          <svg width="26" height="26" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="5" fill="#1C1A17"/>
            <path d="M 3 17 C 7 7, 11 7, 15 17 C 19 27, 23 27, 27 17" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <div class="topbar-nav">
          <a class="nav-item" href="index.html">对话</a>
          <a class="nav-item active" href="knowledge.html">知识库</a>
          <a class="nav-item" href="articles.html">文章</a>
        </div>
        <div style="flex:1"></div>
        <button class="btn btn-accent" disabled title="暂未开放">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新增知识
        </button>
      </header>

      <!-- Knowledge header -->
      <div class="knowledge-header">
        <div class="knowledge-title-row">
          <h1 class="knowledge-title">知识库</h1>
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="搜索文章标题、摘要或正文..." />
            <kbd>⌘ K</kbd>
          </div>
        </div>
      </div>

      <!-- Knowledge body -->
      <div class="knowledge-body">
        <div class="knowledge-stats" id="kbStats">
          <div class="stat"><strong>0</strong> 篇文章</div>
          <div class="stat"><strong>0</strong> 向量索引</div>
        </div>

        <div class="sort-row">
          <span>排序:</span>
          <button class="sort-btn active" onclick="setSort('latest')">最新</button>
          <button class="sort-btn" onclick="setSort('updated')">最近更新</button>
          <button class="sort-btn" onclick="setSort('most_cited')">最多查看</button>
        </div>

        <div class="article-grid" id="articleGrid">
          <div class="muted" style="padding:32px;text-align:center;font-size:13px;">加载中...</div>
        </div>
      </div>
    </main>
  </div>

  <script>
  const API = '';
  let currentSort = 'latest';
  let currentTag = null;
  let currentSearch = '';

  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts,
    });
    const data = await res.json();
    if (data.code !== 0) throw new Error(data.message);
    return data.data;
  }

  function _esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  async function loadStats() {
    try {
      const data = await apiFetch('/api/knowledge/stats');
      document.getElementById('kbStats').innerHTML = `
        <div class="stat"><strong>${data.total_articles}</strong> 篇文章</div>
        <div class="stat"><strong>${data.total_size_human}</strong> 向量索引</div>`;
    } catch (e) { console.error('loadStats error:', e); }
  }

  async function loadArticles() {
    try {
      const params = new URLSearchParams({ sort: currentSort, limit: '50' });
      if (currentTag) params.set('tag', currentTag);
      if (currentSearch) params.set('search', currentSearch);
      const data = await apiFetch(`/api/knowledge/articles?${params}`);
      const grid = document.getElementById('articleGrid');
      if (!data.items.length) {
        grid.innerHTML = `<div style="padding:32px;text-align:center;font-size:13px;color:var(--muted-2);">${currentSearch ? '没有匹配结果' : '还没有知识库文章'}</div>`;
        return;
      }
      grid.innerHTML = data.items.map(a => {
        const preview = (a.summary || '').replace(/\n/g, ' ');
        const meta = [
          a.source || 'Manual',
          a.updated_at ? new Date(a.updated_at).toLocaleDateString('zh-CN') : '',
        ].filter(Boolean).join(' · ');
        return `
          <a class="article-card" href="preview.html?id=${a.article_id}&type=knowledge">
            <div class="article-card-head">
              <span class="article-card-source">${_esc(a.source || 'Manual')}</span>
            </div>
            <h3 class="article-card-title">${_esc(a.title)}</h3>
            <p class="article-card-preview">${_esc(preview || '暂无摘要')}${preview ? '...' : ''}</p>
            <div class="article-card-foot">
              <span>${_esc(meta)}</span>
            </div>
          </a>`;
      }).join('');
    } catch (e) { console.error('loadArticles error:', e); }
  }

  function setSort(sort) {
    currentSort = sort;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    loadArticles();
  }

  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.querySelector('.search-box input');
    searchInput.addEventListener('input', () => {
      currentSearch = searchInput.value.trim();
      loadArticles();
    });
    loadStats();
    loadArticles();
  });
  </script>
</body>
</html>
